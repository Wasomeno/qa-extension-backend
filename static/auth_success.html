<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Authentication Successful | Flowg</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#1e293b",
                "background-light": "#f8f6f6",
                "background-dark": "#221610",
              },
              fontFamily: {
                "display": ["Public Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        body {
            font-family: "Public Sans", sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<div class="relative flex h-full min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="layout-content-container flex flex-col max-w-[560px] w-full bg-white dark:bg-slate-900 shadow-sm border border-slate-100 dark:border-slate-800 rounded-xl p-8 md:p-12 text-center">
<!-- Success Icon Section -->
<div class="flex justify-center mb-8">
<div class="relative">
<div class="absolute inset-0 bg-slate-400/20 rounded-full scale-150 blur-xl"></div>
<div class="relative size-24 md:size-32 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-6xl md:text-7xl font-light">check_circle</span>
</div>
</div>
</div>
<!-- Text Content -->
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl md:text-4xl font-bold leading-tight mb-4">
                        Authentication Successful
                    </h1>
<p class="text-slate-600 dark:text-slate-400 text-base md:text-lg font-normal leading-relaxed mb-10 max-w-md mx-auto">
                        You have been successfully logged into Flowg. You can now close this tab and return to the application.
                    </p>
<!-- Action Button -->
<div class="flex flex-col gap-4 items-center">
<button onclick="window.close()" class="w-full md:w-auto min-w-[240px] flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-8 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:opacity-90 transition-opacity hover:bg-slate-800">
<span class="truncate">Return to Application</span>
</button>
<div class="mt-4 flex items-center gap-2 text-slate-400 dark:text-slate-500 text-sm">
<span class="material-symbols-outlined text-base">timer</span>
<span>Redirecting in <span id="timer">5</span> seconds...</span>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="py-8 px-6 text-center border-t border-slate-200 dark:border-slate-800">
<p class="text-slate-400 dark:text-slate-600 text-xs">
                    © 2024 Flowg Inc. All rights reserved. | <a class="hover:text-primary transition-colors" href="#">Security Overview</a>
</p>
</footer>
</div>
</div>
<script>
    let timeLeft = 5;
    const timerElement = document.getElementById('timer');
    const interval = setInterval(() => {
        timeLeft--;
        if (timerElement) {
            timerElement.textContent = timeLeft;
        }
        if (timeLeft <= 0) {
            clearInterval(interval);
            window.close();
        }
    }, 1000);
</script>
</body>
</html>
