version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379
      - APP_ENV=${APP_ENV}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - GITLAB_REDIRECT_URI=${GITLAB_REDIRECT_URI}
    expose:
      - "3000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
